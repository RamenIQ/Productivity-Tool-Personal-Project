<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Assignment Tracker</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/assignments.css">
  <link rel="stylesheet" href="css/progress.css">
  <link rel="stylesheet" href="css/resources.css">
  <link rel="stylesheet" href="css/schedule.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>
  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <h1 class="app-title">Assignment Tracker</h1>
      <span class="week-label" id="week-label"></span>
    </header>

    <!-- Add Assignment Form -->
    <form class="add-form" id="add-form" autocomplete="off">
      <input
        type="text"
        id="assignment-input"
        placeholder="Add a new assignment..."
        maxlength="200"
        aria-label="Assignment title"
        required
      >
      <input
        type="date"
        id="assignment-date"
        aria-label="Due date (optional)"
      >
      <button type="submit" class="btn-add">+ Add</button>
    </form>

    <!-- Progress Section -->
    <section class="progress-section" aria-label="Weekly progress">
      <div class="progress-header">
        <div class="progress-label-group">
          <span class="progress-emoji" id="progress-emoji">😢</span>
          <span class="progress-label">Weekly Progress</span>
        </div>
        <span class="progress-stats" id="progress-stats">No assignments yet</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <!-- Congratulations Banner -->
    <div class="congrats-banner" id="congrats-banner" role="alert">
      <span class="congrats-icon">🎉</span>
      <div class="congrats-text">
        <strong>Congratulations! All done!</strong>
        <span>You've completed all your assignments for the week.</span>
      </div>
      <button class="congrats-close" id="congrats-close" aria-label="Dismiss">✕</button>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">📋</div>
      <div>No assignments yet.<br>Add one above to get started!</div>
    </div>

    <!-- Assignment List -->
    <ul class="assignment-list" id="assignment-list" aria-label="Assignments"></ul>

    <!-- Class Schedule Section -->
    <section class="schedule-section" aria-label="Class schedule">
      <div class="section-header">
        <h2 class="section-title">Class Schedule</h2>
        <button class="btn-toggle-form" id="toggle-add-class" type="button">+ Add Class</button>
      </div>

      <!-- Collapsible add-class form -->
      <div class="add-class-form-box" id="add-class-form-box">
        <form id="add-class-form" autocomplete="off">
          <div class="class-form-row">
            <input type="text" id="class-name-input" placeholder="Class name..." maxlength="100" required>
            <input type="text" id="class-room" placeholder="Room (optional)" maxlength="50">
          </div>
          <div class="class-form-row">
            <div class="day-checkboxes">
              <label><input type="checkbox" class="day-checkbox" value="Mon"> Mon</label>
              <label><input type="checkbox" class="day-checkbox" value="Tue"> Tue</label>
              <label><input type="checkbox" class="day-checkbox" value="Wed"> Wed</label>
              <label><input type="checkbox" class="day-checkbox" value="Thu"> Thu</label>
              <label><input type="checkbox" class="day-checkbox" value="Fri"> Fri</label>
              <label><input type="checkbox" class="day-checkbox" value="Sat"> Sat</label>
              <label><input type="checkbox" class="day-checkbox" value="Sun"> Sun</label>
            </div>
          </div>
          <div class="class-form-row">
            <input type="time" id="class-start" aria-label="Start time">
            <input type="time" id="class-end" aria-label="End time">
            <div class="color-picker" id="class-color-picker"></div>
            <button type="submit" class="btn-add-class">+ Add Class</button>
          </div>
          <div class="class-form-error" id="class-form-error"></div>
        </form>
      </div>

      <div class="schedule-empty" id="schedule-empty">No classes added yet. Click "+ Add Class" to get started.</div>
      <div class="schedule-list" id="schedule-list"></div>
    </section>

    <!-- Weekly Calendar Section -->
    <section class="calendar-section" aria-label="Weekly calendar">
      <div class="section-header">
        <h2 class="section-title">Weekly Calendar</h2>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

  </div>

  <!-- Scripts (order matters: dependencies first) -->
  <script src="js/storage.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/assignments.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
